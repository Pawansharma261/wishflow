name: Build Android APK
on:
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          cd mobile
          npm install

      - name: ⚒️ Build APK (Local on GH)
        run: |
          cd mobile
          npx eas-cli build --platform android --profile preview --non-interactive --local
          # The local build outputs the .apk file in the current directory or a subfolder

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishflow-android-build
          path: mobile/*.apk
